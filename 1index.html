<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Moto Typing Race</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(180deg,#0f172a,#020617);
color:white;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.container{
width:100%;
max-width:1000px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
padding:30px;
border-radius:30px;
box-shadow:0 0 40px rgba(0,0,0,0.5);
}

h1{
text-align:center;
font-size:55px;
font-weight:900;
margin-bottom:10px;
color:#38bdf8;
}

.sub{
text-align:center;
font-size:20px;
margin-bottom:25px;
color:#cbd5e1;
}

.topo{
display:flex;
justify-content:space-between;
margin-bottom:25px;
font-size:24px;
font-weight:bold;
}

.barra{
width:100%;
height:35px;
background:#1e293b;
border-radius:30px;
overflow:hidden;
margin-bottom:25px;
border:2px solid rgba(255,255,255,0.1);
}

.player{
height:100%;
width:0%;
background:linear-gradient(90deg,#22c55e,#4ade80);
transition:0.2s;
}

.cpu{
height:100%;
width:0%;
background:linear-gradient(90deg,#ef4444,#f87171);
transition:0.5s;
}

.palavra{
font-size:65px;
font-weight:900;
text-align:center;
margin:40px 0;
color:#facc15;
text-shadow:0 0 20px rgba(250,204,21,0.6);
}

input{
width:100%;
padding:22px;
font-size:32px;
border:none;
border-radius:20px;
outline:none;
background:#0f172a;
color:white;
text-align:center;
border:3px solid #38bdf8;
}

.info{
text-align:center;
font-size:24px;
margin-top:20px;
font-weight:bold;
color:#38bdf8;
}

.resultado{
text-align:center;
font-size:50px;
font-weight:900;
margin-top:25px;
}

button{
margin-top:30px;
width:100%;
padding:18px;
border:none;
border-radius:20px;
font-size:24px;
font-weight:bold;
background:#facc15;
color:black;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.03);
}

</style>
</head>

<body>

<div class="container">

<h1>🏍️ Moto Typing Race</h1>

<p class="sub">
Digite rápido para acelerar sua moto e vencer o PC!
</p>

<div class="topo">
<div id="tempo">⏱️ Tempo: 0s</div>
<div id="contador">📚 Palavras: 0/30</div>
</div>

<p>🧑 Você</p>

<div class="barra">
<div class="player" id="player"></div>
</div>

<p>💻 PC</p>

<div class="barra">
<div class="cpu" id="cpu"></div>
</div>

<div class="palavra" id="palavra"></div>

<input
id="input"
autocomplete="off"
autofocus
placeholder="Digite aqui..."
>

<div class="info" id="mensagem"></div>

<div class="resultado" id="resultado"></div>

<button onclick="location.reload()">
🔄 Jogar Novamente
</button>

</div>

<script>

const palavras = [

"moto",
"corrida",
"velocidade",
"programacao",
"digitacao",
"desafio",
"campeao",
"andrea",
"turbo",
"piloto",
"acelerar",
"controle",
"competicao",
"foguete",
"teclado",
"internet",
"rapidez",
"habilidade",
"concentracao",
"foco",
"adrenalina",
"superacao",
"estrada",
"capacete",
"energia",
"combustivel",
"ultrapassar",
"desempenho",
"aventura",
"curva"

];

let player = 0;
let cpu = 0;
let palavrasFeitas = 0;

const inicio = Date.now();

const palavra = document.getElementById("palavra");
const input = document.getElementById("input");
const resultado = document.getElementById("resultado");
const mensagem = document.getElementById("mensagem");

function novaPalavra(){

palavra.innerText =
palavras[Math.floor(Math.random()*palavras.length)];

}

novaPalavra();

input.addEventListener("input", ()=>{

if(input.value === palavra.innerText){

player += 3.4;

palavrasFeitas++;

mensagem.innerText =
"🔥 Boa! Continue acelerando!";

document.getElementById("player").style.width =
player + "%";

document.getElementById("contador").innerText =
"📚 Palavras: " + palavrasFeitas + "/30";

input.value = "";

novaPalavra();

if(palavrasFeitas >= 30){

finalizar();

}

}

});

const cpuInterval = setInterval(()=>{

cpu += Math.random()*2;

document.getElementById("cpu").style.width =
cpu + "%";

},1000);

function finalizar(){

clearInterval(cpuInterval);

const fim = Date.now();

const segundos =
((fim - inicio)/1000).toFixed(1);

input.disabled = true;

if(player > cpu){

resultado.innerHTML =
"🏆 Você venceu!";

}else{

resultado.innerHTML =
"💻 O PC venceu!";

}

document.getElementById("tempo").innerHTML =
"⏱️ Seu tempo: " + segundos + "s";

mensagem.innerHTML =
"⚡ Você digitou 30 palavras!";

}

</script>

</body>
</html>
